<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMINA ERP - Admin Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="admin-body">
    <main class="admin-login-page">
      <form class="admin-login-panel" method="post" action="/admin/login">
        <a href="/" class="navbar-logo">LUMINA ERP</a>
        <div>
          <div class="admin-kicker">Admin Access</div>
          <h1>Sign in to Admin Portal</h1>
          <p class="admin-login-sub">
            After login you can open Storefront, Inventory, and Procurement.
          </p>
        </div>

        {% if error %}
        <div class="admin-login-error">{{ error }}</div>
        {% endif %}

        <label class="admin-login-field">
          <span>Username</span>
          <input
            type="text"
            name="username"
            value="{{ username }}"
            autocomplete="username"
            required
          />
        </label>

        <label class="admin-login-field">
          <span>Password</span>
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </label>

        <button type="submit" class="admin-login-btn">
          <i class="bi bi-box-arrow-in-right"></i>
          Login
        </button>

        <div class="admin-login-hint">
          Demo account: <strong>admin</strong> / <strong>123456!</strong>
          <br />
          New admin? <a href="/admin/register">Register here</a>
        </div>
      </form>
    </main>
  </body>
</html>
