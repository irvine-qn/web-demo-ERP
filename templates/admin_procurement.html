<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMINA ERP - Procurement</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="admin-body">
    {% set active_admin_nav = 'procurement' %}
    {% include "_admin_nav.html" %}

    <main class="admin-page">
      <div class="admin-header">
        <div>
          <div class="admin-kicker">Procurement</div>
          <h1>Supplier Image Search</h1>
        </div>
      </div>

      <section class="procurement-shell">
        <form id="procurementForm" class="procurement-upload">
          <div
            class="procurement-dropzone"
            id="supplierDropzone"
            tabindex="0"
            aria-label="Supplier image upload. Drag, drop, paste, or take a photo."
          >
            <i class="bi bi-cloud-arrow-up"></i>
            <strong>Upload supplier reference image</strong>
            <span>Search similar supply options and handle exceptions</span>
            <div class="dropzone-hints">
              <span><i class="bi bi-arrows-move"></i> Drag &amp; drop</span>
              <span><i class="bi bi-clipboard"></i> Paste (Ctrl+V)</span>
            </div>
            <div class="dropzone-actions">
              <button type="button" class="dropzone-action-btn" data-action="browse">
                <i class="bi bi-folder2-open"></i> Choose file
              </button>
              <button type="button" class="dropzone-action-btn" data-action="camera">
                <i class="bi bi-camera"></i> Take photo
              </button>
            </div>
            <img id="supplierPreview" alt="Supplier preview" />
          </div>
          <input
            type="file"
            id="supplierImageInput"
            accept="image/jpeg,image/png,image/webp"
            hidden
          />
          <input
            type="file"
            id="supplierCameraInput"
            accept="image/*"
            capture="environment"
            hidden
          />
          <button type="submit" class="analyze-btn" id="supplierSearchBtn">
            <i class="bi bi-search"></i>&nbsp; Search Supplier Catalog
          </button>
        </form>

        <div class="procurement-status" id="procurementStatus">
          Upload an image to evaluate supplier availability.
        </div>
        <div class="supplier-grid" id="supplierGrid"></div>
      </section>
    </main>

    <script src="/static/js/image-upload-zone.js"></script>
    <script>
      const procurementForm = document.getElementById("procurementForm");
      const supplierGrid = document.getElementById("supplierGrid");
      const procurementStatus = document.getElementById("procurementStatus");
      const supplierSearchBtn = document.getElementById("supplierSearchBtn");

      const supplierUploadZone = initImageUploadZone({
        dropzone: document.getElementById("supplierDropzone"),
        fileInput: document.getElementById("supplierImageInput"),
        cameraInput: document.getElementById("supplierCameraInput"),
        previewImg: document.getElementById("supplierPreview"),
        statusEl: procurementStatus,
        onFileSelected() {
          procurementStatus.textContent =
            "Image ready. Click Search Supplier Catalog to evaluate availability.";
        },
      });

      procurementForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = supplierUploadZone.getFile();
        if (!file) {
          alert("Please choose an image first.");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);
        supplierSearchBtn.disabled = true;
        supplierSearchBtn.innerHTML =
          '<span class="spinner-border-sm"></span>&nbsp; Searching suppliers...';
        procurementStatus.textContent = "Checking supplier ATP and alternatives...";

        try {
          const response = await fetch("/api/procurement/search-image", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();

          if (response.status === 401) {
            window.location.href = "/admin/login";
            return;
          }

          if (data.status !== "success") {
            procurementStatus.textContent =
              data.message || "No supplier matches found.";
            supplierGrid.innerHTML = "";
            return;
          }

          procurementStatus.textContent =
            "Top match is unavailable. Suggested alternatives are highlighted for cross-selling.";
          supplierGrid.innerHTML = data.results
            .map(
              (item) => `
                <article class="supplier-card ${item.suggested_alternative ? "suggested" : "blocked"}">
                  ${
                    item.suggested_alternative
                      ? '<div class="suggested-label">Suggested Alternatives</div>'
                      : ""
                  }
                  <div class="supplier-rank">Top ${item.rank}</div>
                  <img src="${item.image}" alt="${item.name}" />
                  <div class="supplier-card-body">
                    <div class="supplier-meta">${item.supplier} - SKU ${item.id}</div>
                    <h2>${item.name}</h2>
                    <div class="supplier-price">${item.price}</div>
                    <div class="supplier-footer">
                      <span class="${item.atp === 0 ? "out-stock-pill" : "atp-pill"}">
                        ${item.availability_label}
                      </span>
                      ${
                        item.orderable
                          ? '<button type="button" class="supplier-order-btn">Order</button>'
                          : ""
                      }
                    </div>
                  </div>
                </article>
              `,
            )
            .join("");
        } catch (error) {
          procurementStatus.textContent = "Supplier API connection failed.";
        } finally {
          supplierSearchBtn.disabled = false;
          supplierSearchBtn.innerHTML =
            '<i class="bi bi-search"></i>&nbsp; Search Supplier Catalog';
        }
      });
    </script>
  </body>
</html>
