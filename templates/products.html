<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cửa Hàng - AI Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">👗 AI Fashion Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Tìm kiếm AI</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/products">Cửa hàng</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 fw-bold">Hàng Mới Về</h2>
        <div class="row">
            {% for item in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center" style="height: 250px;">
                        <span class="text-muted">📷 {{ item.category }}</span>
                    </div>
                    <div class="card-body">
                        <span class="badge bg-dark mb-2">{{ item.category }}</span>
                        <h5 class="card-title fw-bold">{{ item.name }}</h5>
                        <p class="card-text text-muted">{{ item.desc }}</p>
                        <h5 class="text-danger fw-bold">{{ item.price }}</h5>
                        <button class="btn btn-outline-dark btn-sm mt-2 w-100">Thêm vào giỏ</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
