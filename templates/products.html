<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shop - AI Fashion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/static/css/style.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }
      .card {
        border-radius: 18px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
      }
      .card-title {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 1.25rem;
      }
      .navbar-brand {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .btn-outline-dark {
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .btn-outline-dark:hover {
        background: #1a1a1a;
        color: #fff;
      }
      .badge.bg-dark {
        background: #1a1a1a !important;
        font-family: "Inter", sans-serif;
        font-size: 0.85rem;
        border-radius: 6px;
      }
      .product-image {
        border-radius: 14px 14px 0 0;
        background: linear-gradient(135deg, #f7f7f5 60%, #e5e5e5 100%);
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">👗 AI Fashion Store</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">AI Search</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/products">Shop</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h2 class="mb-4 fw-bold">New Arrivals</h2>
      <div class="row">
        {% if error %}
        <div class="col-12">
          <div class="alert alert-warning">{{ error }}</div>
        </div>
        {% endif %} {% for item in products %}
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm border-0">
            <div
              class="product-image d-flex align-items-center justify-content-center"
              style="height: 230px"
            >
              <img
                src="{{ item.image }}"
                alt="{{ item.name }}"
                class="w-100 h-100"
                style="object-fit: cover; border-radius: 14px 14px 0 0"
              />
            </div>
            <div class="card-body">
              <span class="badge bg-dark mb-2">{{ item.category }}</span>
              <span class="badge bg-secondary mb-2">{{ item.color }}</span>
              <h5 class="card-title fw-bold">{{ item.name }}</h5>
              <h5 class="text-danger fw-bold">{{ item.price }}</h5>
              <button class="btn btn-outline-dark btn-sm mt-2 w-100 shadow-sm">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
        {% endfor %} {% if products|length == 0 and not error %}
        <div class="col-12">
          <p class="text-center text-muted">No products found</p>
        </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
